<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flemzy Phones - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 span { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e1e1; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; }
        .alert { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success-alert { background: #d4edda; color: #155724; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1><span>Flemzy Phones</span> Pro</h1><p>Sales Management System</p></div>
        <div class="alert" id="loginAlert"></div>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="text" id="username" required placeholder="Enter your email"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="Enter your password"></div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="links"><p>No account? <a href="register.html">Register here</a></p></div>
    </div>
    <script>
        const ADMIN_USERNAME = 'flemzy@admin.com';
        const ADMIN_PASSWORD = 'Admin@123';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('currentUser', JSON.stringify({email: username, role: 'admin', name: 'Flemzy Admin'}));
                window.location.href = 'admin.html';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === username && u.password === btoa(password));
            
            if (user) {
                if (user.status === 'approved') {
                    localStorage.setItem('currentUser', JSON.stringify({email: user.email, role: 'seller', name: user.name, id: user.id}));
                    window.location.href = 'seller.html';
                } else if (user.status === 'pending') {
                    document.getElementById('loginAlert').style.display = 'block';
                    document.getElementById('loginAlert').textContent = '⏳ Pending admin approval';
                } else {
                    document.getElementById('loginAlert').style.display = 'block';
                    document.getElementById('loginAlert').textContent = '❌ Registration rejected';
                }
            } else {
                document.getElementById('loginAlert').style.display = 'block';
                document.getElementById('loginAlert').textContent = '❌ Invalid credentials';
            }
        });
    </script>
</body>
</html>
