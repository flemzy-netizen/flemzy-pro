<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flemzy Phones - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; padding: 40px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #333; font-size: 28px; }
        .logo h1 span { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e1e1; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        .form-group input:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .alert { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1><span>Join</span> Flemzy Phones</h1>
            <p style="color: #666; margin-top: 10px;">Seller registration - Pending approval</p>
        </div>
        <div class="alert" id="successAlert">
            ✅ Registration successful! Wait for admin approval.
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn">Submit for Approval</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="index.html">Login here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            // Get existing users
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if email exists
            if (users.some(u => u.email === email)) {
                alert('Email already registered!');
                return;
            }

            // Create new user (PENDING)
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                phone: phone,
                password: btoa(password), // Simple encoding (use proper hashing in production)
                status: 'pending',
                registeredDate: new Date().toISOString(),
                role: 'seller'
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            // Show success message
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('registerForm').reset();

            // Hide after 5 seconds
            setTimeout(() => {
                document.getElementById('successAlert').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
