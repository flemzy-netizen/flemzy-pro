<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Flemzy Phones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .alert { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .error-alert { background: #f8d7da; color: #721c24; display: none; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; }
        .loading { text-align: center; padding: 10px; color: #666; display: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo"><h1>Join Flemzy</h1><p>Register as Seller</p></div>
        <div class="alert" id="successAlert">✅ Registered! Wait for admin approval.</div>
        <div class="alert error-alert" id="errorAlert"></div>
        <div class="loading" id="loading">Registering...</div>
        <form id="registerForm">
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="phone"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword" required></div>
            <button type="submit" class="btn">Register</button>
        </form>
        <div class="links"><p>Have account? <a href="index.html">Login</a></p></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzoE2Vgo-OUzmCSFwunB_LQH8uT-ICBXs3wDNHcrz5ufschuOplLDK50V3W7nzCaNmCcA/exec';
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                document.getElementById('errorAlert').style.display = 'block';
                document.getElementById('errorAlert').innerHTML = '❌ Passwords do not match';
                return;
            }
            
            const loading = document.getElementById('loading');
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');
            
            loading.style.display = 'block';
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            try {
                // Check if email already exists
                const checkResponse = await fetch(`${SCRIPT_URL}?action=getUsers`);
                const checkResult = await checkResponse.json();
                const existingUsers = checkResult.data || [];
                
                if (existingUsers.some(u => u[1] === email)) {
                    errorAlert.style.display = 'block';
                    errorAlert.innerHTML = '❌ Email already registered!';
                    loading.style.display = 'none';
                    return;
                }
                
                // Register new user
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        type: 'newUser',
                        name: name,
                        email: email,
                        phone: phone,
                        password: btoa(password)
                    })
                });
                
                loading.style.display = 'none';
                successAlert.style.display = 'block';
                document.getElementById('registerForm').reset();
                
                setTimeout(() => {
                    successAlert.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                loading.style.display = 'none';
                errorAlert.style.display = 'block';
                errorAlert.innerHTML = '❌ Registration failed. Please try again.';
                console.error(error);
            }
        });
    </script>
</body>
</html>
