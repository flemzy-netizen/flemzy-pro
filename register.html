<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Flemzy Phones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-container { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .alert { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo"><h1>Join Flemzy</h1><p>Register as Seller</p></div>
        <div class="alert" id="successAlert">✅ Registered! Wait for admin approval.</div>
        <form id="registerForm">
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="phone"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword" required></div>
            <button type="submit" class="btn">Register</button>
        </form>
        <div class="links"><p>Have account? <a href="index.html">Login</a></p></div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) { alert('Passwords do not match'); return; }
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.some(u => u.email === email)) { alert('Email already exists'); return; }
            
            users.push({id: Date.now(), name, email, phone, password: btoa(password), status: 'pending', registeredDate: new Date().toISOString()});
            localStorage.setItem('users', JSON.stringify(users));
            
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('registerForm').reset();
            setTimeout(() => { document.getElementById('successAlert').style.display = 'none'; }, 5000);
        });
    </script>
</body>
</html>
