<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Flemzy Phones Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav-links button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #333; }
        .section { background: white; border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .section-title { font-size: 20px; margin-bottom: 20px; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .pending-card { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .pending-info h4 { margin-bottom: 5px; }
        .btn-approve { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .product-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .product-form input, .product-form select { padding: 10px; border: 2px solid #e1e1e1; border-radius: 8px; }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #dee2e6; }
        .profit-cell { background: #d4edda; font-weight: bold; }
        .low-stock { background: #f8d7da; }
        .action-btn { padding: 5px 10px; margin: 0 5px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #ffc107; }
        .delete-btn { background: #dc3545; color: white; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>👑 Flemzy Admin</h1>
        <div class="nav-links"><span id="adminName">Admin</span> <button onclick="logout()">Logout</button></div>
    </div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Products</h3><div class="stat-number" id="totalProducts">0</div></div>
            <div class="stat-card"><h3>Total Sales</h3><div class="stat-number" id="todaySales">GHC 0</div></div>
            <div class="stat-card"><h3>Pending Approvals</h3><div class="stat-number" id="pendingCount">0</div></div>
            <div class="stat-card"><h3>Low Stock</h3><div class="stat-number" id="lowStockCount">0</div></div>
        </div>
        <div class="section"><h2>⏳ Pending Approvals</h2><div id="pendingList"></div></div>
        <div class="section"><h2>➕ Add Product</h2>
            <div class="product-form">
                <input type="text" id="productName" placeholder="Product Name">
                <select id="productCategory"><option>Android</option><option>iPhone</option><option>Accessories</option></select>
                <input type="number" id="productPrice" placeholder="Price">
                <input type="number" id="productCost" placeholder="Cost Price">
                <input type="number" id="productQuantity" placeholder="Quantity">
                <button class="btn-add" onclick="addProduct()">Add Product</button>
            </div>
        </div>
        <div class="section"><h2>📦 Inventory</h2>
            <input type="text" id="searchProducts" placeholder="Search..." style="width:100%; padding:10px; margin-bottom:20px;">
            <div style="overflow-x:auto;"><table id="productsTable"><thead><tr><th>Product</th><th>Price</th><th>Cost</th><th>Profit</th><th>Stock</th><th>Actions</th></tr></thead><tbody id="productsBody"></tbody></table></div>
        </div>
    </div>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'admin') window.location.href = 'index.html';
        document.getElementById('adminName').innerHTML = 'Welcome, ' + (currentUser.name || 'Admin');
        
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        if(products.length === 0) {
            products = [{id:1, name:'iPhone 13', sellingPrice:4500, costPrice:4000, quantity:10, category:'iPhone'},
                        {id:2, name:'Samsung S21', sellingPrice:3200, costPrice:2800, quantity:8, category:'Android'}];
            localStorage.setItem('products', JSON.stringify(products));
        }
        
        function renderPending() {
            const pending = users.filter(u => u.status === 'pending');
            document.getElementById('pendingCount').innerHTML = pending.length;
            const container = document.getElementById('pendingList');
            if(pending.length === 0) { container.innerHTML = '<p>No pending approvals</p>'; return; }
            container.innerHTML = pending.map(u => `<div class="pending-card"><div><h4>${u.name}</h4><p>${u.email}</p></div><div><button class="btn-approve" onclick="approveUser(${u.id})">Approve</button><button class="btn-reject" onclick="rejectUser(${u.id})">Reject</button></div></div>`).join('');
        }
        
        function renderProducts() {
            const search = document.getElementById('searchProducts')?.value.toLowerCase() || '';
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            document.getElementById('productsBody').innerHTML = filtered.map(p => `<tr><td>${p.name}</td><td>GHC ${p.sellingPrice}</td><td>GHC ${p.costPrice}</td><td class="profit-cell">GHC ${p.sellingPrice - p.costPrice}</td><td class="${p.quantity < 5 ? 'low-stock' : ''}">${p.quantity}</td><td><button class="action-btn edit-btn" onclick="editProduct(${p.id})">Edit</button><button class="action-btn delete-btn" onclick="deleteProduct(${p.id})">Delete</button></td></tr>`).join('');
            document.getElementById('totalProducts').innerHTML = products.length;
            document.getElementById('lowStockCount').innerHTML = products.filter(p => p.quantity < 5).length;
        }
        
        window.approveUser = function(id) {
            users = users.map(u => u.id === id ? {...u, status: 'approved'} : u);
            localStorage.setItem('users', JSON.stringify(users));
            renderPending();
        };
        
        window.rejectUser = function(id) {
            users = users.map(u => u.id === id ? {...u, status: 'rejected'} : u);
            localStorage.setItem('users', JSON.stringify(users));
            renderPending();
        };
        
        window.addProduct = function() {
            const name = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const cost = parseFloat(document.getElementById('productCost').value);
            const qty = parseInt(document.getElementById('productQuantity').value);
            if(!name || !price || !cost || !qty) { alert('Fill all fields'); return; }
            products.push({id: Date.now(), name, sellingPrice: price, costPrice: cost, quantity: qty, category: document.getElementById('productCategory').value});
            localStorage.setItem('products', JSON.stringify(products));
            renderProducts();
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCost').value = '';
            document.getElementById('productQuantity').value = '';
        };
        
        window.editProduct = function(id) {
            const p = products.find(p => p.id === id);
            const newQty = prompt('New quantity:', p.quantity);
            if(newQty) { p.quantity = parseInt(newQty); localStorage.setItem('products', JSON.stringify(products)); renderProducts(); }
        };
        
        window.deleteProduct = function(id) {
            if(confirm('Delete?')) { products = products.filter(p => p.id !== id); localStorage.setItem('products', JSON.stringify(products)); renderProducts(); }
        };
        
        window.logout = function() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; };
        
        document.getElementById('searchProducts')?.addEventListener('input', renderProducts);
        renderPending();
        renderProducts();
    </script>
</body>
</html>
